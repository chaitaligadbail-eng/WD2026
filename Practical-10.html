<!DOCTYPE html>
<html>
<head>
<title>Iframe Example</title>

<style>
body{
font-family: Arial, sans-serif;
margin:0;
background:#f2f2f2;
}

/* Header */
header{
background:#333;
color:white;
text-align:center;
padding:15px;
}

/* Layout */
.container{
display:flex;
height:90vh;
}

/* Sidebar */
.sidebar{
width:20%;
background:#444;
padding:20px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin:10px 0;
padding:8px;
background:#666;
border-radius:5px;
}

.sidebar a:hover{
background:#888;
}

/* Iframe area */
.content{
flex:1;
padding:10px;
}

iframe{
width:100%;
height:100%;
border:2px solid #333;
border-radius:5px;
}

</style>
</head>

<body>

<header>
<h1>HTML Iframe Demo Page</h1>
</header>

<div class="container">

<!-- Navigation Links -->
<div class="sidebar">
<a href="https://www.wikipedia.org" target="frame">Open Wikipedia</a>
<a href="https://www.w3schools.com" target="frame">Open W3Schools</a>
<a href="https://www.openai.com" target="frame">Open OpenAI</a>
</div>

<!-- Iframe Content -->
<div class="content">
<iframe name="frame"></iframe>
</div>

</div>

<!-- Google Map Example -->
<h2 style="text-align:center;">Embedded Map</h2>

<div style="width:80%; margin:auto;">
<iframe 
src="https://www.google.com/maps?q=Nagpur&output=embed"
width="100%"
height="400"
style="border:0;"
allowfullscreen=""
loading="lazy">
</iframe>
</div>

</body>
</html>
